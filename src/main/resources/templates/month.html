<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Галочки</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 24px;
        }

        table {
            border-collapse: collapse;
            margin-bottom: 28px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 6px 8px;
            text-align: center;
        }

        th:first-child,
        td:first-child {
            text-align: left;
            min-width: 180px;
        }

        .other-month {
            color: #aaa;
            background: #f5f5f5;
        }

        .empty {
            color: #777;
        }
    </style>
</head>
<body>

<h1>
    Галочки —
    <span th:text="${page.yearMonth()}">2026-04</span>
</h1>

<form method="post" action="/activities">
    <input type="text" name="title" placeholder="Новое дело" required>
    <button type="submit">Добавить</button>
</form>

<p th:if="${#lists.isEmpty(page.activities())}" class="empty">
    Пока дел нет. Добавь первое дело.
</p>

<div th:each="week, weekStat : ${page.weeks()}">
    <h2>
        Неделя <span th:text="${weekStat.index + 1}">1</span>
    </h2>

    <table th:if="${!#lists.isEmpty(page.activities())}">
        <thead>
        <tr>
            <th>Дело</th>
            <th th:each="day : ${week.days()}"
                th:classappend="${!day.currentMonth()} ? 'other-month'">
                <span th:text="${day.dayOfMonth()}">1</span>
            </th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="activity : ${page.activities()}">
            <td th:text="${activity.title}">Java</td>

            <td th:each="day : ${week.days()}"
                th:classappend="${!day.currentMonth()} ? 'other-month'">
                0
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
