<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Галочки</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 24px;
        }

        table {
            border-collapse: collapse;
            margin-bottom: 28px;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 6px 8px;
            text-align: center;
        }

        th:first-child,
        td:first-child {
            text-align: left;
            min-width: 180px;
        }

        .other-month {
            color: #aaa;
            background: #f5f5f5;
        }

        .empty {
            color: #777;
        }

        .galochka-cell {
            cursor: pointer;
            min-width: 34px;
            user-select: none;
        }

        .galochka-cell:hover {
            background: #eaf3ff;
        }

        .galochka-cell.checked {
            background: #d8f5d0;
            font-weight: bold;
        }
    </style>
</head>

<script>
    document.addEventListener('click', function (event) {
        const cell = event.target.closest('.galochka-cell');

        if (!cell) {
            return;
        }

        const activityId = cell.dataset.activityId;
        const date = cell.dataset.date;

        const params = new URLSearchParams();
        params.append('activityId', activityId);
        params.append('date', date);

        fetch('/api/galochki/toggle', {
            method: 'POST',
            body: params
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Ошибка сохранения галочки');
                }
                return response.json();
            })
            .then(data => {
                cell.textContent = data.value;

                if (data.value !== '0') {
                    cell.classList.add('checked');
                } else {
                    cell.classList.remove('checked');
                }
            })
            .catch(error => {
                console.error(error);
                alert('Не удалось сохранить галочку');
            });
    });
</script>

<body>

<h1>
    Галочки —
    <span th:text="${page.yearMonth()}">2026-04</span>
</h1>

<form method="post" action="/activities">
    <input type="text" name="title" placeholder="Новое дело" required>
    <button type="submit">Добавить</button>
</form>

<p th:if="${#lists.isEmpty(page.weeks())}">
    Пока данных нет.
</p>

<div th:each="week, weekStat : ${page.weeks()}">
    <h2>
        Неделя <span th:text="${weekStat.index + 1}">1</span>
    </h2>

    <table>
        <thead>
        <tr>
            <th>Дело</th>
            <th th:each="day : ${week.days()}"
                th:classappend="${!day.currentMonth()} ? 'other-month'">
                <span th:text="${day.dayOfMonth()}">1</span>
            </th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="row : ${week.rows()}">
            <td th:text="${row.title()}">Java</td>

            <td th:each="cell, cellStat : ${row.cells()}"
                class="galochka-cell"
                th:classappend="|${!week.days()[cellStat.index].currentMonth() ? ' other-month' : ''}${cell.value() != '0' ? ' checked' : ''}|"
                th:data-activity-id="${cell.activityId()}"
                th:data-date="${cell.date()}"
                th:text="${cell.value()}">
                0
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
