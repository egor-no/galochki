<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Галочки</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&display=swap');

        :root {
            --ink: #102f75;
            --ink-light: rgba(16, 47, 117, 0.65);
            --paper: #e6e1d2;
            --grid-blue: rgba(70, 125, 180, 0.24);
            --grid-blue-light: rgba(70, 125, 180, 0.13);
            --red-line: rgba(190, 40, 45, 0.72);
        }

        html {
            min-height: 100%;
        }

        body {
            margin: 0;
            padding: 34px 42px;
            color: var(--ink);
            font-family: "Caveat", "Comic Sans MS", cursive;
            font-size: 26px;

            background-color: var(--paper);
            background-image:
                    linear-gradient(to right, var(--grid-blue-light) 1px, transparent 1px),
                    linear-gradient(to bottom, var(--grid-blue-light) 1px, transparent 1px),
                    linear-gradient(to right, var(--grid-blue) 1px, transparent 1px),
                    linear-gradient(to bottom, var(--grid-blue) 1px, transparent 1px);
            background-size:
                    12px 12px,
                    12px 12px,
                    60px 60px,
                    60px 60px;
        }

        h1 {
            margin: 0 0 20px;
            font-size: 54px;
            font-weight: 700;
            letter-spacing: 1px;
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 8px;
        }

        form,
        div {
            box-sizing: border-box;
        }

        input,
        select,
        button {
            font-family: "Caveat", "Comic Sans MS", cursive;
            font-size: 24px;
            color: var(--ink);
            background: transparent;
            border: 2px solid var(--ink);
            border-radius: 0;
            padding: 4px 12px;
            outline: none;
            box-shadow: none;
        }

        input::placeholder {
            color: rgba(16, 47, 117, 0.55);
        }

        button {
            cursor: pointer;
            background: rgba(255, 255, 255, 0.12);
        }

        button:hover,
        select:hover,
        input:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        a {
            color: var(--ink);
            text-decoration: none;
            font-size: 28px;
        }

        a:hover {
            text-decoration: underline;
            text-decoration-thickness: 2px;
            text-underline-offset: 5px;
        }

        p {
            font-size: 30px;
        }

        .table-wrap {
            position: relative;
            overflow-x: auto;
            margin-top: 26px;
            border: none;
            border-radius: 0;
            background: transparent;
            padding-bottom: 8px;
        }

        .galochki-table {
            border-collapse: collapse;
            border-spacing: 0;
            margin-bottom: 0;
            min-width: max-content;
            background: transparent;
        }

        .galochki-table th,
        .galochki-table td {
            width: 26px;
            min-width: 26px;
            max-width: 26px;
            height: 26px;
            padding: 0;
            text-align: center;
            color: var(--ink);
            border: none;
            background: transparent;
            font-weight: 500;
            box-sizing: border-box;
        }

        .galochki-table thead th {
            font-size: 22px;
            font-weight: 600;
            vertical-align: middle;
        }

        .activity-head,
        .activity-name {
            width: 250px !important;
            min-width: 250px !important;
            max-width: 250px !important;
            position: sticky;
            left: 0;
            z-index: 2;
            text-align: left !important;
            color: var(--ink);
            font-weight: 600;
            border-right: 3px solid var(--red-line) !important;
            padding-left: 8px !important;
            padding-right: 12px !important;
        }

        .activity-head {
            z-index: 4;
            font-size: 34px !important;
        }

        .activity-name {
            font-size: 26px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .week-separator {
            width: 26px !important;
            min-width: 26px !important;
            max-width: 26px !important;
            padding: 0 !important;
            background: transparent !important;
            border-right: none !important;
            border-left: 2px solid var(--red-line) !important;
            cursor: default;
            pointer-events: none;
        }

        .galochka-cell {
            position: relative;
            cursor: pointer;
            width: 26px;
            min-width: 26px;
            max-width: 26px;
            height: 26px;
            padding: 0 !important;
            user-select: none;
            font-size: 0;
            line-height: 26px;
        }

        .galochka-cell::before {
            content: "";
            position: absolute;
            left: 2px;
            top: 2px;
            width: 20px;
            height: 20px;
            background: transparent;
            transition: background 0.12s ease, transform 0.08s ease;
        }

        .galochka-cell:hover::before {
            background: rgba(255, 255, 255, 0.32);
            transform: rotate(-1deg);
        }

        .galochka-cell.checked::after {
            content: "✓";
            position: absolute;
            left: 3px;
            top: -5px;
            width: 20px;
            height: 20px;
            color: var(--ink);
            font-size: 20px;
            line-height: 26px;
            font-weight: 700;
        }

        .galochka-cell.checked {
            background: transparent !important;
        }

        .edit-toggle {
            border: none;
            font-size: 34px;
            padding: 0 8px;
            vertical-align: middle;
        }

        .edit-panel {
            display: none;
            margin-bottom: 20px;
        }

        body.edit-mode .edit-panel {
            display: block;
        }

        .edit-col {
            display: none;
            width: 34px !important;
            min-width: 34px !important;
            max-width: 34px !important;
        }

        .edit-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .edit-inline-form {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 0;
        }

        .view-title {
            display: block;
        }

        .edit-title-form {
            display: none;
            gap: 6px;
            align-items: center;
        }

        body.edit-mode .view-title {
            display: none;
        }

        body.edit-mode .edit-title-form {
            display: flex;
        }

        .edit-title-form input {
            width: 170px;
            height: 34px;
            font-size: 24px;
        }

        .week-start-disabled {
            position: relative;
            opacity: 0.65;
            pointer-events: none;
        }

        .week-start-disabled select {
            background:
                    repeating-linear-gradient(
                            -45deg,
                            rgba(16, 47, 117, 0.08),
                            rgba(16, 47, 117, 0.08) 4px,
                            transparent 4px,
                            transparent 8px
                    );
        }


        body.edit-mode .edit-col {
            display: table-cell;
        }

        .activity-edit-line {
            display: none;
            align-items: center;
            gap: 4px;
        }

        body.edit-mode .activity-edit-line {
            display: flex;
        }

        .edit-title-form {
            display: block;
            margin: 0;
        }

        .edit-title-form input {
            width: 190px;
            height: 28px;
            font-size: 22px;
            padding: 0 6px;
        }

        .erase-btn {
            border: none !important;
            background: transparent !important;
            padding: 0 !important;
            margin: 0;
            width: 24px;
            height: 28px;
            line-height: 28px;
            font-size: 22px;
        }

        .other-month {
            color: rgba(16, 47, 117, 0.35) !important;
            background: rgba(255, 255, 255, 0.12) !important;
        }

        .other-month.checked {
            color: rgba(16, 47, 117, 0.45) !important;
        }

        @media (max-width: 900px) {
            body {
                padding: 26px 18px;
                font-size: 22px;
            }

            h1 {
                font-size: 42px;
            }

            input,
            select,
            button {
                font-size: 21px;
                margin-bottom: 6px;
            }

            .activity-head,
            .activity-name {
                width: 220px !important;
                min-width: 220px !important;
                max-width: 220px !important;
            }
        }
    </style>
</head>

<script>
    document.addEventListener('click', function (event) {
        const cell = event.target.closest('.galochka-cell');

        if (!cell) {
            return;
        }

        const activityId = cell.dataset.activityId;
        const date = cell.dataset.date;

        const params = new URLSearchParams();
        params.append('activityId', activityId);
        params.append('date', date);

        fetch('/api/galochki/toggle', {
            method: 'POST',
            body: params
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Ошибка сохранения галочки');
                }
                return response.json();
            })
            .then(data => {
                cell.textContent = '';

                if (data.value !== '0') {
                    cell.classList.add('checked');
                } else {
                    cell.classList.remove('checked');
                }
            })
            .catch(error => {
                console.error(error);
                alert('Не удалось сохранить галочку');
            });
    });

    function toggleEditMode() {
        document.body.classList.toggle('edit-mode');
    }

    document.addEventListener('submit', function (event) {
        const form = event.target.closest('.edit-title-form');

        if (!form) {
            return;
        }

        event.preventDefault();

        const input = form.querySelector('input[name="title"]');
        const activityId = form.querySelector('input[name="activityId"]').value;

        const params = new URLSearchParams();
        params.append('activityId', activityId);
        params.append('title', input.value);

        fetch('/activities/update', {
            method: 'POST',
            body: params
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Ошибка обновления');
                }

                const cell = form.closest('.activity-name');
                const viewTitle = cell.querySelector('.view-title');

                if (viewTitle) {
                    viewTitle.textContent = input.value;
                    input.dataset.original = input.value;
                }
            })
            .catch(error => {
                console.error(error);
                alert('Не удалось обновить');
            });
    });

    document.addEventListener('focusout', function (event) {
        const input = event.target.closest('.edit-title-form input[name="title"]');

        if (!input) {
            return;
        }

        if (input.value === input.dataset.original) {
            return;
        }

        input.form.requestSubmit();
    });
</script>

<body>

<h1>
    Галочки —
    <span th:text="${page.yearMonth()}">2026-04</span>

    <button type="button" class="edit-toggle" onclick="toggleEditMode()" title="Редактировать">
        ✎
    </button>
</h1>

<div style="margin-bottom: 16px;">
    <form method="get" action="/month" style="display: inline-block;">
        <input type="hidden" name="year" th:value="${page.yearMonth().year}">
        <input type="hidden" name="month" th:value="${page.yearMonth().monthValue}">

        <select name="pageId" onchange="this.form.submit()">
            <option th:each="option : ${page.pageOptions()}"
                    th:value="${option.id()}"
                    th:selected="${option.id().equals(page.pageId())}"
                    th:text="${option.title()}">
                Основная
            </option>
        </select>
    </form>
</div>

<div class="edit-panel">
    <div class="edit-row">
        <form method="post" action="/pages/update" class="edit-inline-form">
            <input type="hidden" name="pageId" th:value="${page.pageId()}">
            <input type="hidden" name="year" th:value="${page.yearMonth().year}">
            <input type="hidden" name="month" th:value="${page.yearMonth().monthValue}">

            <input type="text" name="title" th:value="${page.pageTitle()}" required>

            <span class="week-start-disabled" title="Пока нельзя менять первый день недели">
                <select disabled>
                    <option value="MONDAY">Понедельник</option>
                    <option value="TUESDAY">Вторник</option>
                    <option value="WEDNESDAY">Среда</option>
                    <option value="THURSDAY">Четверг</option>
                    <option value="FRIDAY">Пятница</option>
                    <option value="SATURDAY">Суббота</option>
                    <option value="SUNDAY">Воскресенье</option>
                </select>
            </span>

            <button type="submit">Сохранить страницу</button>
        </form>

        <form method="post" action="/pages/delete" class="edit-inline-form"
              onsubmit="return confirm('Удалить страницу полностью? Все дела и галочки тоже удалятся.');">
            <input type="hidden" name="pageId" th:value="${page.pageId()}">
            <button type="submit">Стереть страницу</button>
        </form>
    </div>

    <form method="post" action="/pages" class="edit-inline-form edit-row">
        <input type="text" name="title" placeholder="Новая страница" required>

        <select name="weekStartDay" required>
            <option value="MONDAY">Понедельник</option>
            <option value="TUESDAY">Вторник</option>
            <option value="WEDNESDAY">Среда</option>
            <option value="THURSDAY">Четверг</option>
            <option value="FRIDAY">Пятница</option>
            <option value="SATURDAY">Суббота</option>
            <option value="SUNDAY">Воскресенье</option>
        </select>

        <button type="submit">Создать страницу</button>
    </form>
</div>

<div style="margin-bottom: 16px;">
    <a th:href="@{/month(pageId=${page.pageId()}, year=${page.previousMonth().year}, month=${page.previousMonth().monthValue})}">        ← Предыдущий месяц
    </a>

    <a th:href="@{/month}" style="margin: 0 16px;">
        Текущий месяц
    </a>

    <a th:href="@{/month(pageId=${page.pageId()}, year=${page.nextMonth().year}, month=${page.nextMonth().monthValue})}">
        Следующий месяц →
    </a>
</div>

<div id="editPanel" class="edit-panel">
    <form method="post" action="/activities">
        <input type="hidden" name="pageId" th:value="${page.pageId()}">
        <input type="hidden" name="year" th:value="${page.yearMonth().year}">
        <input type="hidden" name="month" th:value="${page.yearMonth().monthValue}">

        <input type="text" name="title" placeholder="Новое дело" required>
        <button type="submit">Добавить</button>
    </form>
</div>

<p th:if="${#lists.isEmpty(page.rows())}">
    Пока данных нет.
</p>

<div class="table-wrap">
    <table th:if="${!#lists.isEmpty(page.rows())}" class="galochki-table">
        <thead>
        <tr>
            <th class="activity-head">Дело</th>
            <th class="week-separator"></th>
            <th:block th:each="week, weekStat : ${page.weeks()}">
                <th th:each="day : ${week.days()}"
                    th:classappend="${!day.currentMonth()} ? ' other-month'">
                    <span th:text="${day.dayOfMonth()}">1</span>
                </th>

                <th th:if="${!weekStat.last}" class="week-separator"></th>
            </th:block>
        </tr>
        </thead>

        <tbody>
        <tr th:each="row : ${page.rows()}">
            <td class="activity-name">
                <span class="view-title" th:text="${row.title()}"></span>

                <div class="activity-edit-line">
                    <form class="edit-title-form">
                        <input type="hidden" name="activityId" th:value="${row.activityId()}">

                        <input type="text"
                               name="title"
                               th:value="${row.title()}"
                               th:attr="data-original=${row.title()}"
                               required>
                    </form>

                    <form method="post" action="/activities/delete"
                          onsubmit="return confirm('Удалить дело полностью? Галочки тоже удалятся.');">
                        <input type="hidden" name="activityId" th:value="${row.activityId()}">
                        <input type="hidden" name="pageId" th:value="${page.pageId()}">
                        <input type="hidden" name="year" th:value="${page.yearMonth().year}">
                        <input type="hidden" name="month" th:value="${page.yearMonth().monthValue}">

                        <button type="submit" class="erase-btn" title="Стереть дело">⌫</button>
                    </form>
                </div>
            </td>
            <td class="week-separator"></td>
            <th:block th:each="weekCells, weekStat : ${row.weeks()}">
                <td th:each="cell, cellStat : ${weekCells.cells()}"
                    class="galochka-cell"
                    th:classappend="|${!page.weeks()[weekStat.index].days()[cellStat.index].currentMonth() ? ' other-month' : ''}${cell.value() != '0' ? ' checked' : ''}|"
                    th:data-activity-id="${cell.activityId()}"
                    th:data-date="${cell.date()}"
                    th:text="${''}">
                    0
                </td>

                <td th:if="${!weekStat.last}" class="week-separator"></td>
            </th:block>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
